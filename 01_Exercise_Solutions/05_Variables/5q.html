<!DOCTYPE html>
<html>

  <head>
    <title>Calculator</title>
  </head>

  <body>
    <button onclick="
      calculation += '1';
      console.log(calculation);
    ">
      1
    </button>

    <button onclick="
      calculation += '2';
      console.log(calculation);
    ">
      2
    </button>

    <button onclick="
      calculation += '3';
      console.log(calculation);
    ">
      3
    </button>

    <button onclick="
      calculation += ' + ';
      console.log(calculation);
    ">
      +
    </button>

    <!-- -------------------- -->

    <!--
    Note:
    - eval() takes a string and executes it as JavaScript code.
    - Avoid using eval() in real-world projects because it can execute harmful code.
    - We are using it here only for learning purposes.
    -->

    <button onclick="
      calculation = eval(calculation);
      console.log(calculation);
    ">
      =
    </button>

    <!-- -------------------- -->

    <script>
      let calculation = '';
    </script>
  </body>

</html>
