<!DOCTYPE html>
<html>

  <head>
    <title>HTML CSS Review</title>

    <style>
      .red-button {
        background-color: red;
        color: white;
        border: none;
      }

      .yellow-button {
        background-color: yellow;
      }
    </style>
  </head>

  <body>
    <button title="Good job!" class="red-button">
      hello
    </button>

    <p>
      Paragraph <button class="yellow-button">hello</button> of text
    </p>
  </body>

</html>

<!--
  Benefits of following this structure:
  1. We can add other elements inside the <head> e.g. The <title>.
  2. When using Live Server, our web page automatically refreshes after saving changes.
-->
