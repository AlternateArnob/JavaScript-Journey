<!DOCTYPE html>
<html>

  <head>
    <title>HTML CSS Review</title>

    <style>
      /*
        This is a comment inside CSS.
      */

      .red-button {
        background-color: red;
        color: white;
        border: none;
      }

      .yellow-button {
        background-color: yellow;
      }
    </style>
  </head>

  <body>
    <!--
      This is a comment inside HTML.
    -->

    <button title="Good job!" class="red-button" onclick="
        alert('Good job!');
      ">
      hello
    </button>

    <p>
      Paragraph <button class="yellow-button">hello</button> of text
    </p>

    <script>
      // This is a single line comment inside JavaScript.

      // This code creates a popup.
      // alert('hello'); // Example of commenting out code.

      /*
        This is a multiline comment
        inside JavaScript.
      */
    </script>
  </body>

</html>

<!--
There are 2 ways to run JavaScript code inside HTML:
1. The <script> element.
2. The onclick attribute.
   Runs JavaScript code whenever the button is clicked.

We also learned how to write comments in HTML, CSS, and JavaScript.
-->
