<!DOCTYPE html>
<html>

  <head>
    <title>Cart Quantity</title>
  </head>

  <body>
    <button onclick="
      console.log(`Cart quantity: ${cartQuantity}`);
      ">
      Show Quantity
    </button>

    <button onclick="
      // cartQuantity = cartQuantity + 1;
      cartQuantity++;
      console.log(`Cart quantity: ${cartQuantity}`);
    ">
      Add to Cart
    </button>

    <button onclick="
      // cartQuantity = cartQuantity + 2;
      cartQuantity += 2;
      console.log(`Cart quantity: ${cartQuantity}`);
    ">
      +2
    </button>

    <button onclick="
      // cartQuantity = cartQuantity + 3;
      cartQuantity += 3;
      console.log(`Cart quantity: ${cartQuantity}`);
    ">
      +3
    </button>

    <button onclick="
      cartQuantity = 0;
      console.log(`Cart was reset.`);
      console.log(`Cart quantity: ${cartQuantity}`);
    ">
      Reset Cart
    </button>

    <script>
      let cartQuantity = 0;
    </script>
  </body>

</html>

<!--
01. Shortcuts for Re-assigning Variables:

  1. n += 1; -> n = n + 1;
  2. n++; -> n = n + 1;

  3. n -= 1; -> n = n - 1;
  4. n--; -> n = n - 1;

  5. n += 2; -> n = n + 2;
  6. n -= 2; -> n = n - 2;
  7. n *= 2; -> n = n * 2;
  8. n /= 2; -> n = n / 2;


02. Best practices for naming variables:
  1. camelCase -> cartQuantity. (The standard naming convention in JavaScript)
  2. PascalCase -> CartQuantity.
  3. kebab-case -> cart-quantity. (Not valid for JavaScript variable names)
  4. snake_case -> cart_quantity.
-->
