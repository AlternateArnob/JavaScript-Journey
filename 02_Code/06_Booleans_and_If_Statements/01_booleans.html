<!DOCTYPE html>
<html>

  <head>
    <title>Booleans</title>
  </head>

  <body>
    <script>
      // There are only two boolean values: true and false.
      console.log(typeof true); // boolean
      console.log(typeof false); // boolean

      // A boolean value represents whether something is true or false.
      console.log(3 < 5); // true
      console.log(3 > 5); // false

      // Follow Note 01 and 02.

      // Comparing a number with a string.
      console.log(5 == '5.00'); // true
      console.log(5 === '5.00'); // false

      console.log(3 > 5 - 5); // true // 3 > 0
    </script>
  </body>

</html>

<!--
Note:

01. Comparison Operators:
>     greater than
<     less than
>=    greater than or equal to
<=    less than or equal to
===   equal to
!==   not equal to

Additional Note:
- == and != try to convert the values to the same type before comparing.
- === and !== compare both the value and the data type.
-->
