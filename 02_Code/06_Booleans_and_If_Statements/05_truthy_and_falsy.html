<!DOCTYPE html>
<html>

  <head>
    <title>Truthy and Falsy Values</title>
  </head>

  <body>
    <script>
      if(5) // 5 behaves like true, so it is a truthy value.
      {
        console.log('truthy');
      }

      if(0) // 0 behaves like false, so it is a falsy value.
      {
        console.log('truthy');
      }

      // Follow Note.

      // --------------------

      // Example of using a truthy value:

      const cartQuantity = 5;

      // if(cartQuantity > 0) // explicit condition
      if(cartQuantity) // used truthy value
      {
        console.log('cart has products');
      }

      // --------------------

      // Using the NOT operator.
      console.log(!0); // true

      // --------------------

      // Falsy values:

      // We have already learned: false, 0, ''.

      console.log('text' / 5); // NaN

      let variable1;
      console.log(variable1); // undefined

      const variable2 = undefined;
      console.log(variable2); // undefined

      // We will learn null later.

    </script>
  </body>

</html>

<!--
Note:
Falsy and Truthy Values:
  - false, 0, '', NaN, undefined, null.
  - Any value not on this list is truthy.
-->
