<!DOCTYPE html>
<html>

  <head>
    <title>Functions</title>
  </head>

  <body>
    <script>
      function function1()
      {
        console.log('hello');
        console.log(2 + 2);
      }

      function1(); // Call function
      function1(); // Call function
    </script>
  </body>

</html>

<!--
Function:
- A function lets us reuse code.
-->

<!--
Function naming rules:
- Same as variable naming rules.
- Cannot use reserved keywords (e.g. function).
- Cannot start with a number.
- Only $ and _ are allowed as special characters.
- Best practice: use camelCase.
-->
